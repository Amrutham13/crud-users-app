<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">
  <h1>Users</h1>

  <div class="grid">
    <!-- Left: actions -->
    <div class="panel">
      <div class="tabs">
        <button class="tab active" data-tab="create">Create</button>
        <button class="tab" data-tab="update">Update</button>
        <button class="tab" data-tab="delete">Delete</button>
      </div>

      <!-- Create -->
      <div class="tab-content active" id="tab-create">
        <div class="panel-body">
          <div class="field">
            <label>Name</label>
            <input type="text" id="c-name" placeholder="Enter name" />
          </div>
          <div class="field">
            <label>Message</label>
            <textarea id="c-message" placeholder="Enter message"></textarea>
          </div>
          <button class="btn btn-dark" id="createBtn">Create user</button>
          <div class="toast" id="c-toast"></div>
        </div>
      </div>

      <!-- Update -->
      <div class="tab-content" id="tab-update">
        <div class="panel-body">
          <div class="field">
            <label>User ID</label>
            <input type="number" id="u-id" placeholder="e.g. 3" />
          </div>
          <div class="divider"></div>
          <div class="field">
            <label>New Name</label>
            <input type="text" id="u-name" placeholder="Updated name" />
          </div>
          <div class="field">
            <label>New Message</label>
            <textarea id="u-message" placeholder="Updated message"></textarea>
          </div>
          <button class="btn btn-amber" id="updateBtn">Update user</button>
          <div class="toast" id="u-toast"></div>
        </div>
      </div>

      <!-- Delete -->
      <div class="tab-content" id="tab-delete">
        <div class="panel-body">
          <div class="field">
            <label>User ID</label>
            <input type="number" id="d-id" placeholder="e.g. 3" />
          </div>
          <button class="btn btn-red" id="deleteBtn">Delete user</button>
          <div class="toast" id="d-toast"></div>
        </div>
      </div>
    </div>

    <!-- Right: users list -->
    <div class="panel users-panel">
      <div class="panel-header">
        <span class="panel-title">All Users</span>
        <span class="count-badge" id="countBadge">—</span>
      </div>
      <div class="panel-body" id="usersList">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
